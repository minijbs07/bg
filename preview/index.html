<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BusGo! — Parada en tiempo real</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Apple App Clip meta — Safari renders the native card at top automatically -->
    <meta name="apple-itunes-app" content="app-id=6503249842, app-clip-bundle-id=R49R583W8Q.com.javi.TUSApp.Clip">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        :root {
            --bg: #000;
            --text: #F5F5F7;
            --muted: #86868B;
            --orange: #FF9F0A;
            --yellow: #FFD60A;
            --blue: #0A84FF;
            --glass: rgba(28,28,30,0.6);
            --border: rgba(255,255,255,0.10);
        }
        html, body { width: 100%; min-height: 100vh; overflow-x: hidden; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            position: relative;
        }

        /* Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 8s ease-in-out infinite;
        }
        .orb-1 { width: 340px; height: 340px; background: rgba(10,132,255,0.18); top: -80px; right: -60px; animation-delay: 0s; }
        .orb-2 { width: 260px; height: 260px; background: rgba(255,159,10,0.14); bottom: 10%; left: -80px; animation-delay: -3s; }
        .orb-3 { width: 200px; height: 200px; background: rgba(255,214,10,0.10); top: 40%; right: 5%; animation-delay: -5s; }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(12px, -18px) scale(1.04); }
            66% { transform: translate(-8px, 10px) scale(0.97); }
        }

        /* Main wrapper */
        .page {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top spacer — Apple banner takes ~76px at top of Safari */
        .banner-spacer {
            height: 20px;
            width: 100%;
        }

        /* Arrow section — points UP toward Apple's native banner */
        .arrows-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            margin-top: 32px;
            margin-bottom: 8px;
        }
        .arrow-row {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
        }
        .arrow-row:nth-child(1) { opacity: 1; }
        .arrow-row:nth-child(2) { opacity: 0.6; margin-top: -4px; }
        .arrow-row:nth-child(3) { opacity: 0.25; margin-top: -4px; }

        .arrow {
            animation: arrowBounce 1.4s ease-in-out infinite;
        }
        .arrow-row:nth-child(2) .arrow { animation-delay: 0.15s; }
        .arrow-row:nth-child(3) .arrow { animation-delay: 0.30s; }

        @keyframes arrowBounce {
            0%, 100% { transform: translateY(0); }
            45% { transform: translateY(-8px); }
        }

        /* Arrow SVG sizes per row */
        .arrow-row:nth-child(1) .arrow svg { width: 32px; height: 32px; }
        .arrow-row:nth-child(2) .arrow svg { width: 24px; height: 24px; }
        .arrow-row:nth-child(3) .arrow svg { width: 18px; height: 18px; }

        /* Tap hint text */
        .tap-hint {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            text-align: center;
            margin-top: 16px;
            letter-spacing: -0.2px;
            line-height: 1.4;
        }
        .tap-hint span {
            background: linear-gradient(90deg, var(--orange), var(--yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tap-sub {
            font-size: 13px;
            color: var(--muted);
            text-align: center;
            margin-top: 6px;
            line-height: 1.5;
        }

        /* Stop card */
        .stop-card {
            margin-top: 36px;
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .stop-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .stop-name {
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
        }
        .stop-id {
            font-size: 13px;
            color: var(--muted);
            margin-top: 2px;
        }

        /* Logo / branding at bottom */
        .brand {
            margin-top: auto;
            padding: 32px 0 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .brand-name {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(90deg, var(--orange), var(--yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand-sub {
            font-size: 12px;
            color: var(--muted);
        }

        /* iOS only hint — hide on desktop */
        .desktop-notice {
            display: none;
            margin-top: 40px;
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
        }
        @media (pointer: fine) {
            .desktop-notice { display: block; }
            .arrows-block { opacity: 0.4; }
            .tap-hint { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="page">
        <div class="banner-spacer"></div>

        <!-- Arrows pointing UP toward Apple's native App Clip banner -->
        <div class="arrows-block">
            <!-- Row 1: largest, most opaque (closest to banner) -->
            <div class="arrow-row">
                <div class="arrow">
                    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 28V6M6 14l10-10 10 10" stroke="#FF9F0A" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="arrow" style="animation-delay: 0.08s">
                    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 28V6M6 14l10-10 10 10" stroke="#FFD60A" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="arrow" style="animation-delay: 0.16s">
                    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 28V6M6 14l10-10 10 10" stroke="#FF9F0A" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </div>
            <!-- Row 2: medium -->
            <div class="arrow-row">
                <div class="arrow">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 20V5M5 11l7-7 7 7" stroke="#FF9F0A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="arrow" style="animation-delay: 0.22s">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 20V5M5 11l7-7 7 7" stroke="#FFD60A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="arrow" style="animation-delay: 0.30s">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 20V5M5 11l7-7 7 7" stroke="#FF9F0A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </div>
            <!-- Row 3: small, most faded (farthest from banner) -->
            <div class="arrow-row">
                <div class="arrow">
                    <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 15V4M4 8.5l5-5 5 5" stroke="#FF9F0A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="arrow" style="animation-delay: 0.36s">
                    <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 15V4M4 8.5l5-5 5 5" stroke="#FFD60A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="arrow" style="animation-delay: 0.44s">
                    <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 15V4M4 8.5l5-5 5 5" stroke="#FF9F0A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </div>
        </div>

        <p class="tap-hint">Pulsa el banner de arriba<br>para abrir <span>BusGo!</span> al instante</p>
        <p class="tap-sub">Sin instalar nada. Solo toca y consulta<br>los próximos buses en tiempo real.</p>

        <!-- Stop info card -->
        <div class="stop-card">
            <span class="stop-label">Parada</span>
            <span class="stop-name" id="stopName">Cargando...</span>
            <span class="stop-id" id="stopId"></span>
        </div>

        <!-- Desktop notice -->
        <div class="desktop-notice">
            Esta página está diseñada para Safari en iPhone.<br>
            Abre este enlace desde tu iPhone para ver el App Clip.
        </div>

        <div class="brand">
            <span class="brand-name">BusGo!</span>
            <span class="brand-sub">Buses de Sevilla en tiempo real</span>
        </div>
    </div>

    <script>
        // Extract stop ID from URL path: /preview/1234/ or /bg/preview/1234/
        (function() {
            var segments = location.pathname.replace(/\/$/, '').split('/').filter(Boolean);
            var stopId = segments[segments.length - 1];

            // Validate it's a number
            if (stopId && /^\d+$/.test(stopId)) {
                document.getElementById('stopId').textContent = 'ID ' + stopId;
                document.getElementById('stopName').textContent = 'Parada ' + stopId;
                document.title = 'BusGo! — Parada ' + stopId;
            } else {
                document.getElementById('stopName').textContent = 'Parada desconocida';
                document.getElementById('stopId').textContent = '';
            }
        })();
    </script>
</body>
</html>
